name: Lock threads

on:
  # Daily
  schedule:
    - cron: '0 0 * * *'
  # Manual trigger
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  lock:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: dessant/lock-threads@851cffe46851ddd2051ea7147ebdc995113241c3 # v6
        with:
          issue-inactive-days: '2'
          pr-inactive-days: '2'
          process-only: 'issues, prs'
